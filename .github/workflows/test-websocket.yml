name: Test TzevaAdom WebSocket Connectivity
on: workflow_dispatch

jobs:
  test-websocket:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install ws
      - name: Test WebSocket from GitHub Actions (US servers)
        run: node test-websocket.js
        timeout-minutes: 1
